name: Request Collective Content Change
description: Ask an agent to apply a targeted edit to an existing collective-level content pack and open a PR.
title: "[collective-change]: "
labels: ["collective-request"]
body:
  - type: markdown
    attributes:
      value: |
        Submit this issue and an agent will edit an existing collective-level content pack — channel posts about the Nano Collective itself, independent of any product release. The agent opens a PR which auto-closes this issue on merge.

        **Scope** is the most important field — pick the narrowest scope that fits the change. The agent will refuse to touch files outside the scope you choose.

        Need a brand-new collective pack instead? Use **Request Collective Content**. For changes to a product release pack, use **Request Product Content Change**.

        If the first attempt doesn't land cleanly, comment `/retry` to re-run with the same fields. Edit the issue body if you want to refine the request first; only `/retry` triggers the agent.

  - type: input
    id: slug
    attributes:
      label: Slug
      description: Kebab-case identifier of the existing pack to edit. Must match a directory under `content/_collective/`.
      placeholder: "economics-charter-explainer"
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: |
        - **Whole pack** — anything in the pack. Use sparingly.
        - **Headline channels (channels/*.md)** — only the channel posts.
        - **Specific file** — one file only. Requires File path.
      options:
        - Headline channels (channels/*.md)
        - Specific file
        - Whole pack
    validations:
      required: true

  - type: input
    id: file_path
    attributes:
      label: File path
      description: Required if scope = "Specific file". Path relative to the pack root.
      placeholder: "channels/linkedin.md"

  - type: textarea
    id: request
    attributes:
      label: Request
      description: What should the agent change? Be specific about what to do, not just what's wrong.
      placeholder: |
        e.g. "Tighten the GitHub Discussion piece on governance — drop the abstract framing and lead with the concrete decision-making cadence."
        e.g. "Rephrase any sentence in the LinkedIn post that reads as marketing — keep the engineering register."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Optional. Background, examples, links the agent should read, or anything else that should shape the change.
      placeholder: |
        Optional. e.g. "We posted the original to LinkedIn last week and got feedback that it read as too promotional."
