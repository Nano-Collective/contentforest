name: Request Product Content Change
description: Ask an agent to apply a targeted edit to an existing product release pack and open a PR.
title: "[product-change]: "
labels: ["change-request"]
body:
  - type: markdown
    attributes:
      value: |
        Submit this issue and an agent will read your request, make the edit, and open a PR. The PR auto-closes this issue on merge.

        **Scope** is the most important field — pick the narrowest scope that fits the request. The agent will refuse to touch files outside the scope you choose.

        If the first attempt doesn't land cleanly, comment `/retry` to re-run with the same fields. Edit the issue body if you want to refine the request first; only `/retry` triggers the agent.

  # BEGIN AUTO-TARGETS — generated by sync-change-targets; do not edit by hand
  - type: dropdown
    id: target
    attributes:
      label: Target
      description: |
        Pick what to edit. `<product>/<version>` targets the release pack itself (channels, meta, or a single file under it). `<product>/<version>/articles/<slug>` targets one article inside a pack. List is auto-generated from `content/` on `main`, sorted newest-first.
      options:
        - get-md/1.5.0
        - get-md/1.5.0/articles/batch-sitemap-large-site-crawl
        - get-md/1.5.0/articles/chunk-markdown-rag-pipeline
        - nanocoder/1.26.0
        - nanocoder/1.26.0/articles/json-tool-fallback
        - nanocoder/1.26.0/articles/nano-mode
        - nanocoder/1.26.0/articles/reasoning-traces
        - nanocoder/1.25.0
        - nanocoder/1.25.0/articles/alwaysallow-bugfix
        - nanocoder/1.25.0/articles/modular-system-prompt
        - nanocoder/1.25.0/articles/subagent-extensibility
    validations:
      required: true
  # END AUTO-TARGETS

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: |
        - **Whole pack / article** — anything in the chosen target. Use sparingly.
        - **Headline channels (channels/*.md)** — only the channel posts at the target. For a pack target, the four headline release channels; for an article target, the article's channel set.
        - **Specific file** — one file only. Requires File path.
      options:
        - Whole pack / article
        - Headline channels (channels/*.md)
        - Specific file
    validations:
      required: true

  - type: input
    id: file_path
    attributes:
      label: File path
      description: Required if scope = "Specific file". Path relative to the target root (e.g. `channels/linkedin.md` for a pack target, or `channels/x.md` for an article target).
      placeholder: "channels/linkedin.md"

  - type: textarea
    id: request
    attributes:
      label: Request
      description: What should the agent change? Be specific about what to do, not just what's wrong.
      placeholder: |
        e.g. "Tighten the LinkedIn post by ~30% — it's too long. Keep the lede and the closing CTA."
        e.g. "Add a paragraph to the GitHub Discussion explaining how MCP support works in practice. Link to docs.nanocollective.org/nanocoder/configuration/mcp-configuration."
        e.g. "Rephrase any sentence that reads like marketing — keep the engineering register."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Optional. Background, examples, or anything else the agent should know.
      placeholder: |
        Optional. e.g. "We posted the original to LinkedIn last week and got feedback that it read as too promotional."
