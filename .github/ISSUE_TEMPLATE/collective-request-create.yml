name: Request Collective Content
description: Ask an agent to write a new collective-level content pack (not tied to a product release).
title: "[collective]: "
labels: ["collective-request"]
body:
  - type: markdown
    attributes:
      value: |
        Submit this issue and an agent will write a new collective-level content pack — channel posts about the Nano Collective itself, independent of any product release. The agent opens a PR which auto-closes this issue on merge.

        Use this for things like a community update, an economics-charter explainer, a brand-voice post, a governance-model writeup. For per-release product packs, use the **release** auto-pipeline. To edit an existing collective pack, use **Request Collective Content Change**.

        Pick a fresh slug — if a pack already exists at that slug the agent will edit in place rather than create a new one, which is probably not what you want from this template.

        If the first attempt doesn't land cleanly, comment `/retry` to re-run with the same fields. Edit the issue body if you want to refine the request first; only `/retry` triggers the agent.

  - type: input
    id: slug
    attributes:
      label: Slug
      description: Kebab-case identifier for the new content pack. Becomes the directory name at `content/_collective/<slug>/`. Must not already exist.
      placeholder: "economics-charter-explainer"
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: |
        - **Whole pack** — generate every channel post plus meta.json. Default for new packs.
        - **Headline channels (channels/*.md)** — only the channel posts (rare for a fresh create; usually you want the whole pack).
        - **Specific file** — one file only. Requires File path. Rarely used for creates.
      options:
        - Whole pack
        - Headline channels (channels/*.md)
        - Specific file
    validations:
      required: true

  - type: input
    id: file_path
    attributes:
      label: File path
      description: Required if scope = "Specific file". Path relative to the pack root.
      placeholder: "channels/linkedin.md"

  - type: textarea
    id: request
    attributes:
      label: Request
      description: What should the agent write? Be specific about angle, audience, and what point you want made across the pack.
      placeholder: |
        e.g. "Write a pack explaining why we built the economics charter — the angle is that revenue-sharing inside a small collective is a coordination problem, not a fairness problem. Audience: founder-engineers thinking about side projects."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Optional. Background, examples, links the agent should read, or anything else that should shape the piece.
      placeholder: |
        Optional. e.g. "We just published _refs/collective/organisation/economics-charter.md — that's the source of truth, ground claims there. The audience is the same one we wrote to for the brand-voice post last month."
