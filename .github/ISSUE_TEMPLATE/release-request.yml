name: Request New Release Content
description: Ask an agent to generate a fresh content pack for a new product release and open a PR.
title: "[release]: "
labels: ["release-request"]
body:
  - type: markdown
    attributes:
      value: |
        Submit this issue and an agent will read the product's GitHub release, generate the full content pack (channel posts + any articles), validate it, and open a PR. The PR auto-closes this issue on merge.

        Use this for a **new release** — a product/version that doesn't have a pack yet. To edit an existing pack, use **Request Product Content Change** instead.

        If the first attempt doesn't land cleanly, comment `/retry` to re-run with the same fields. Edit the issue body if you want to refine it first; only `/retry` triggers the agent.

  # BEGIN AUTO-PRODUCTS — generated by sync-release-products; do not edit by hand
  - type: dropdown
    id: product
    attributes:
      label: Product
      description: Which product's release to write about. List is auto-generated from `config/products.json` on `main`.
      options:
        - nanocoder
        - nanotune
        - get-md
        - json-up
        - prompt-scrub
    validations:
      required: true
  # END AUTO-PRODUCTS

  - type: input
    id: version
    attributes:
      label: Version
      description: The release tag without the `v` prefix (e.g. `1.28.0`). A published GitHub Release with this tag must exist — the agent reads its body as the source material.
      placeholder: "1.28.0"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Optional. An angle to lead with, something to emphasise or avoid, or background the release notes don't cover. Folded into the source material the agent works from.
      placeholder: |
        Optional. e.g. "Lead the announcement on the ACP/Zed integration — that's the headline feature this cycle, not the smaller fixes."
