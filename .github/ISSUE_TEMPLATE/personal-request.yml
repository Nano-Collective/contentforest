name: Request Personal Pack
description: Generate a team member's personal-voice channel posts grounded in an existing release or collective pack.
title: "[personal-request]: "
labels: ["personal-request"]
body:
  - type: markdown
    attributes:
      value: |
        Submit this issue and an agent will generate a **personal-pack** — channel posts in the chosen team member's voice, grounded 1:1 in an existing release pack or collective pack on `main`. The output lands at `<base-pack>/personal/<member>/`. The agent opens a PR which auto-closes this issue on merge.

        Anyone can request a personal pack for any team member — the requester is recorded in the sidecar but does not have to match the picked member. Channels are sourced from `config/team.json`: a member only gets posts on channels they list there, even if the base pack targets others.

        If the first attempt doesn't land cleanly, comment `/retry` to re-run with the same fields. Edit the issue body if you want to refine it first; only `/retry` triggers the agent.

  # BEGIN AUTO-MEMBERS — generated by sync-team-members; do not edit by hand
  - type: dropdown
    id: member
    attributes:
      label: Member
      description: Pick the team member to generate a personal pack for. The list is auto-generated from `config/team.json` on `main`.
      options:
        - will
    validations:
      required: true
  # END AUTO-MEMBERS

  - type: dropdown
    id: base_pack_kind
    attributes:
      label: Base pack kind
      description: |
        - **Product release** — a pack under `content/<product>/<version>/`
        - **Collective pack** — a pack under `content/_collective/<slug>/`
      options:
        - Product release
        - Collective pack
    validations:
      required: true

  - type: input
    id: base_pack_id
    attributes:
      label: Base pack id
      description: |
        For a **product release**, use `<product>/<version>` (e.g. `nanocoder/1.25.0`).
        For a **collective pack**, use the slug only (e.g. `contentforest-launch`).
        The pack must already exist on `main` — the agent grounds the personal post in its files.
      placeholder: "nanocoder/1.25.0"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Optional. Background, the angle the member should lean into, or anything else that should shape the personal voice.
      placeholder: |
        Optional. e.g. "Lean into the operational/architecture angle on LinkedIn — that's what Will's audience tends to engage with."
