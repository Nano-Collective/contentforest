name: Build and Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.actor }}-push
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Test gate — mirrors nanocoder's release.yml: run the same `test:*`
      # surface in sequence so any failure aborts the deploy. Semgrep is the
      # one piece of `pnpm test:all` we skip here — it's already gated on PRs
      # via `pr-checks.yaml`, and adding it to deploy would mean pulling the
      # Semgrep container on every push for marginal extra coverage.
      - name: Check formatting
        run: pnpm test:format

      - name: Type check
        run: pnpm test:types

      - name: Lint
        run: pnpm test:lint

      - name: Run AVA tests
        run: pnpm test:ava

      - name: Check for unused code
        run: pnpm test:knip

      - name: Security audit
        run: pnpm test:audit

      - name: Build
        run: pnpm build

      - name: Verify static export artefacts
        run: |
          test -f dist/index.html
          test -d dist/_next
          echo "✓ static export verified"

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: contentforest
          directory: ./dist
          branch: main
