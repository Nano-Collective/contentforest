name: Sync Change Targets

# Keeps the target dropdown in the "Request Product Content Change" issue
# template aligned with what's on disk under `content/<product>/`. Runs
# whenever a push to main changes anything under `content/` (or the sync
# script / workflow itself), regenerates the marker-bracketed target block
# in the template, and commits the result back if it changed.
#
# Pushes from the default GITHUB_TOKEN do not recursively trigger workflows,
# so this can't loop on its own commit. Sister to sync-pack-options.yaml.

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'scripts/sync-change-targets.ts'
      - '.github/workflows/sync-change-targets.yaml'

permissions:
  contents: write

concurrency:
  group: sync-change-targets
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 10.11.0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Regenerate target dropdown
        run: pnpm sync-change-targets

      - name: Commit if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet -- .github/ISSUE_TEMPLATE/change-request.yml; then
            echo "no changes — target dropdown already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/ISSUE_TEMPLATE/change-request.yml
          git commit -m "chore: sync change-request target dropdown [skip ci]"
          git push
