name: Sync Change Targets

# Keeps the target dropdown in the "Request Product Content Change" issue
# template aligned with what's on disk under `content/<product>/`. Runs
# whenever a push to main changes anything under `content/` (or the sync
# script / workflow itself), regenerates the marker-bracketed target block
# in the template, and commits the result back if it changed.
#
# Pushes from the default GITHUB_TOKEN do not recursively trigger workflows,
# so this can't loop on its own commit. Sister to sync-pack-options.yaml.

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'scripts/sync-change-targets.ts'
      - '.github/workflows/sync-change-targets.yaml'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-change-targets
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # pin: actions/checkout@v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up PNPM
        # pin: pnpm/action-setup@v4.4.0
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10.11.0

      - name: Use Node.js 22
        # pin: actions/setup-node@v4.4.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Regenerate target dropdown
        run: pnpm sync-change-targets

      - name: Commit on chore branch and open PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          FILE=.github/ISSUE_TEMPLATE/change-request.yml
          BRANCH=chore/sync-change-targets
          if git diff --quiet -- "$FILE"; then
            echo "no changes — target dropdown already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add "$FILE"
          git commit -m "chore: sync change-request target dropdown"
          git push --force --set-upstream origin "$BRANCH"
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: sync change-request target dropdown" \
              --body "Auto-generated by sync-change-targets. Regenerates the target dropdown in change-request.yml from the directories under content/."
          else
            echo "PR #$EXISTING already open for $BRANCH — force-pushed update"
          fi
