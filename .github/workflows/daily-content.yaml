name: Daily Content Generation

on:
  schedule:
    # 08:00 UTC daily. Comment out while we're still backfilling manually.
    # - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      product:
        description: "Product slug (omit to detect all new releases)"
        required: false
        type: string
      version:
        description: "Version to generate (required if product is set)"
        required: false
        type: string
      dry_run:
        description: "Write to content/_test/ instead of opening a PR"
        required: false
        type: boolean
        default: false

concurrency:
  group: daily-content
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 10.11.0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build and install Nanocoder from main
        run: |
          git clone --depth 1 https://github.com/Nano-Collective/nanocoder.git /tmp/nanocoder
          cd /tmp/nanocoder
          npm install
          npm run build
          npm link
          which nanocoder
          nanocoder --version || true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Ensure PR labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create auto-release --color "1f6feb" --description "Automated release pack PR" --force
          gh label create failed-validation --color "d93f0b" --description "Validator found hard-rule failures" --force

      - name: Fetch reference docs
        run: pnpm fetch-refs

      - name: Resolve jobs
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_PRODUCT: ${{ inputs.product }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_PRODUCT:-}" ]; then
            if [ -z "${INPUT_VERSION:-}" ]; then
              echo "::error::version is required when product is set"
              exit 1
            fi
            JOBS=$(jq -nc \
              --arg product "$INPUT_PRODUCT" \
              --arg version "$INPUT_VERSION" \
              '[{ "product": $product, "version": $version, "releaseBody": "", "releaseTagUrl": "" }]')
          else
            JOBS=$(pnpm --silent detect-releases)
          fi
          echo "$JOBS" > /tmp/jobs.json
          COUNT=$(jq 'length' /tmp/jobs.json)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Resolved $COUNT job(s):"
          jq . /tmp/jobs.json

      - name: Generate, validate, and open PRs
        if: steps.resolve.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run }}
          # Skip the model-context probe to models.dev for unknown providers.
          NANOCODER_CONTEXT_LIMIT: "128000"
        run: |
          set -euo pipefail
          COUNT=$(jq 'length' /tmp/jobs.json)
          # Track whether any iteration hit a system failure so we can fail
          # the whole step at the end (we still want to attempt every job
          # rather than aborting the loop on the first hard failure).
          ANY_SYSTEM_FAILURE=0

          for i in $(seq 0 $((COUNT - 1))); do
            JOB=$(jq -c ".[$i]" /tmp/jobs.json)
            PRODUCT=$(jq -r '.product' <<<"$JOB")
            VERSION=$(jq -r '.version' <<<"$JOB")
            BRANCH="auto/release-${PRODUCT}-${VERSION}"
            PACK_DIR="content/${PRODUCT}/${VERSION}"
            CHANNELS_DIR="${PACK_DIR}/channels"
            echo ""
            echo "::group::generate ${PRODUCT}@${VERSION}"

            # Skip if a branch already exists for this pack — prevents
            # duplicate PRs on retried runs.
            if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
              echo "branch $BRANCH already exists on origin, skipping"
              echo "::endgroup::"
              continue
            fi

            git checkout -B "$BRANCH" origin/main

            if [ "${DRY_RUN:-false}" = "true" ]; then
              pnpm generate --job-spec "$JOB" --test
              echo "dry_run: skipping PR open"
              echo "::endgroup::"
              continue
            fi

            # Run generation. Validation failures (content present but rules
            # broken) are NOT system failures — we still open a PR with the
            # failed-validation label. Generation crashes (Nanocoder Ink
            # error, network, etc.) ARE system failures — we clean up and
            # surface them as red workflow status.
            set +e
            pnpm generate --job-spec "$JOB" --commit
            GEN_STATUS=$?
            set -e

            # Discriminator: did Nanocoder actually write channel files?
            # If not, it's a system failure (most often: Ink TTY error,
            # API key error, model unavailable). Don't push junk to origin.
            CHANNEL_COUNT=$(find "$CHANNELS_DIR" -maxdepth 1 -name "*.md" 2>/dev/null | wc -l | tr -d ' ')
            if [ "${CHANNEL_COUNT:-0}" -lt 1 ]; then
              echo "::error::nanocoder produced no channel files for ${PRODUCT}@${VERSION} — system failure"
              # Clean up the half-written pack so a retry starts fresh.
              rm -rf "$PACK_DIR"
              # Reset the local branch — we never want to keep this state.
              git checkout main
              git branch -D "$BRANCH" 2>/dev/null || true
              ANY_SYSTEM_FAILURE=1
              echo "::endgroup::"
              continue
            fi

            # We have content. Stage, commit, push.
            git add content/
            if [ -z "$(git diff --cached --name-only)" ]; then
              echo "no content changes after add; skipping PR"
              git checkout main
              git branch -D "$BRANCH" 2>/dev/null || true
              echo "::endgroup::"
              continue
            fi
            git commit -m "auto: release pack ${PRODUCT} v${VERSION}"
            git push --set-upstream origin "$BRANCH"

            META_PATH="${PACK_DIR}/meta.json"
            FINAL_STATUS=$(jq -r '.final_status // "unknown"' "$META_PATH" 2>/dev/null || echo "unknown")
            GEN_ATTEMPTS=$(jq -r '.generation_attempts // 0' "$META_PATH" 2>/dev/null || echo "0")
            FIX_ATTEMPTS=$(jq -r '.auto_fix_attempts // 0' "$META_PATH" 2>/dev/null || echo "0")

            LABELS="auto-release"
            if [ "$FINAL_STATUS" != "passed" ] || [ "$GEN_STATUS" -ne 0 ]; then
              LABELS="auto-release,failed-validation"
            fi

            BODY=$(printf 'Automated release pack for **%s** v%s.\n\n- Final status: `%s`\n- Generation attempts: `%s`\n- Auto-fix attempts: `%s`\n\nThe validator runs on this PR via `validate-content.yaml`. If hard rules failed, see the validation-report artifact on the workflow run.' \
              "$PRODUCT" "$VERSION" "$FINAL_STATUS" "$GEN_ATTEMPTS" "$FIX_ATTEMPTS")

            # Try to open the PR. If creation fails (auth, transient API
            # error), the branch on origin is orphaned — delete it so the
            # next run isn't blocked by the idempotency guard.
            set +e
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Release pack: ${PRODUCT} v${VERSION}" \
              --body "$BODY" \
              --label "$LABELS"
            PR_STATUS=$?
            set -e

            if [ "$PR_STATUS" -ne 0 ]; then
              echo "::error::pr creation failed for ${PRODUCT}@${VERSION} — deleting remote branch to unblock retries"
              git push origin --delete "$BRANCH" 2>/dev/null || true
              ANY_SYSTEM_FAILURE=1
            fi

            git checkout main
            git branch -D "$BRANCH" 2>/dev/null || true
            echo "::endgroup::"
          done

          if [ "$ANY_SYSTEM_FAILURE" -eq 1 ]; then
            echo "::error::one or more jobs hit a system failure; see logs above"
            exit 1
          fi
