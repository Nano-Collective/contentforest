name: Collective Request

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

concurrency:
  # One concurrent run per issue. A `/retry` comment that fires while the
  # previous attempt is still running queues behind it.
  group: collective-request-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  apply:
    # We listen on `labeled` only (not `opened`) because GitHub fires both
    # when an issue is created with the label already applied, and the dual
    # firing previously caused the second run to nuke the first run's branch.
    # `labeled` fires for every label add — gate on the specific label name
    # so other labels (e.g. `processing`) don't kick off another run.
    if: |
      (
        github.event_name == 'issues'
        && github.event.label.name == 'collective-request'
      )
      || (
        github.event_name == 'issue_comment'
        && startsWith(github.event.comment.body, '/retry')
        && contains(github.event.issue.labels.*.name, 'collective-request')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Verify requester is a public NC org member
        id: gate
        # Belt-and-braces with .github/workflows/gate-issues.yaml, which closes
        # non-member issues. The two workflows race on `issues: opened`; this
        # check prevents wasting a Nanocoder spawn if collective-request happens
        # to win the race against the gate. We emit `member=true|false` as a
        # step output and condition every subsequent step on it.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          set -euo pipefail
          STATUS=$(gh api -i "orgs/Nano-Collective/public_members/${AUTHOR}" 2>&1 \
            | awk 'NR==1 {print $2}' || echo "404")
          if [ "${STATUS:-404}" = "204" ]; then
            echo "$AUTHOR verified as public NC org member"
            echo "member=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::skipping collective-request — $AUTHOR is not a public NC org member (status=$STATUS); gate-issues.yaml will close the issue"
            echo "member=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.gate.outputs.member == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PNPM
        if: steps.gate.outputs.member == 'true'
        uses: pnpm/action-setup@v2
        with:
          version: 10.11.0

      - name: Use Node.js 22
        if: steps.gate.outputs.member == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        if: steps.gate.outputs.member == 'true'
        run: pnpm install --no-frozen-lockfile

      - name: Build and install Nanocoder from main
        if: steps.gate.outputs.member == 'true'
        run: |
          git clone --depth 1 https://github.com/Nano-Collective/nanocoder.git /tmp/nanocoder
          cd /tmp/nanocoder
          npm install
          npm run build
          npm link
          which nanocoder
          nanocoder --version || true

      - name: Configure git
        if: steps.gate.outputs.member == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Ensure PR / issue labels exist
        if: steps.gate.outputs.member == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create collective-request --color "1f6feb" --description "Issue requesting collective-level content" --force
          gh label create processing --color "fbca04" --description "Content-request agent is currently running" --force
          gh label create failed-change --color "d93f0b" --description "Content-request agent could not produce a clean result" --force

      - name: Mark issue as processing
        if: steps.gate.outputs.member == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          gh issue edit "$ISSUE" --add-label processing --remove-label failed-change || true

      - name: Fetch reference docs
        if: steps.gate.outputs.member == 'true'
        run: pnpm fetch-refs

      - name: Parse issue body into job spec
        id: parse
        if: steps.gate.outputs.member == 'true'
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          REQUESTER: ${{ github.event.issue.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          SPEC=$(printf '%s' "$ISSUE_BODY" | pnpm --silent parse-collective-request --requester "$REQUESTER" --issue-number "$ISSUE_NUMBER")
          echo "$SPEC" > /tmp/spec.json
          echo "Parsed spec:"
          jq . /tmp/spec.json
          SLUG=$(jq -r '.slug' /tmp/spec.json)
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Guard change-mode requests against unknown slugs
        id: guard
        # Issues opened from the "Request Collective Content Change" template
        # (title prefix `[collective-change]:`) are intended to edit an existing
        # pack. If the slug doesn't match a real pack directory, the agent would
        # silently fall back to `create` mode and produce a brand-new pack at a
        # made-up slug — almost never what the requester meant. Catch that here
        # and tell them which slugs are valid instead.
        if: |
          steps.gate.outputs.member == 'true'
          && startsWith(github.event.issue.title, '[collective-change]:')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLUG: ${{ steps.parse.outputs.slug }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          if [ -d "content/_collective/$SLUG" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          AVAILABLE=$(find content/_collective -mindepth 1 -maxdepth 1 -type d -printf '- `%f`\n' 2>/dev/null | sort)
          if [ -z "$AVAILABLE" ]; then
            AVAILABLE="_(none yet — there are no collective packs to change)_"
          fi
          BODY=$(printf '❌ This is a **collective content change** request, but no pack exists at `content/_collective/%s/`.\n\nThe slug must match an existing pack directory exactly. Available packs:\n\n%s\n\nFix the **Slug** field in this issue and comment `/retry` to re-run. If you actually want a brand-new pack, close this issue and use the **Request Collective Content** template instead.' "$SLUG" "$AVAILABLE")
          gh issue comment "$ISSUE" --body "$BODY"
          gh issue edit "$ISSUE" --add-label failed-change --remove-label processing || true
          echo "ok=false" >> "$GITHUB_OUTPUT"

      - name: Apply request
        id: apply
        if: |
          steps.gate.outputs.member == 'true'
          && steps.guard.outputs.ok != 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          NANOCODER_CONTEXT_LIMIT: "128000"
          SLUG: ${{ steps.parse.outputs.slug }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          BRANCH="collective/${SLUG}-issue-${ISSUE}"

          # Defensive guard against duplicate runs racing on the same issue.
          # /retry intentionally discards the previous attempt; any other
          # event sees an existing branch as a sibling run that's already
          # handling this issue, and exits cleanly without touching it.
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            if [ "${{ github.event_name }}" = "issue_comment" ]; then
              echo "branch $BRANCH already exists on origin — /retry deleting for clean retry"
              git push origin --delete "$BRANCH" || true
            else
              echo "branch $BRANCH already exists on origin — another run is handling this issue, exiting"
              exit 0
            fi
          fi

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          git checkout -B "$BRANCH" origin/main

          set +e
          pnpm collective-request --job-spec "$(cat /tmp/spec.json)"
          AGENT_STATUS=$?
          set -e
          echo "agent_status=$AGENT_STATUS" >> "$GITHUB_OUTPUT"

      - name: Push branch and open PR
        id: pr
        if: always() && steps.apply.outputs.branch != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.apply.outputs.branch }}
          AGENT_STATUS: ${{ steps.apply.outputs.agent_status }}
          SLUG: ${{ steps.parse.outputs.slug }}
          ISSUE: ${{ github.event.issue.number }}
          REQUESTER: ${{ github.event.issue.user.login }}
        run: |
          set -euo pipefail

          # If the agent didn't actually change any tracked files, there's
          # nothing to PR. Comment on the issue and exit cleanly.
          git add content/
          if [ -z "$(git diff --cached --name-only)" ]; then
            echo "agent produced no diff — nothing to PR"
            gh issue comment "$ISSUE" --body "The agent ran but did not modify any files. Either the request needed no change, or the scope was too narrow. Re-open with a clearer request, or add a \`/retry\` comment after editing the issue body."
            exit 0
          fi

          git commit -m "collective-request: ${SLUG} (issue #${ISSUE})"
          git push --set-upstream origin "$BRANCH"

          LABELS="collective-request"
          if [ "${AGENT_STATUS:-1}" -ne 0 ]; then
            LABELS="collective-request,failed-change"
          fi

          BODY=$(printf 'Closes #%s\n\nCollective-request from @%s — see issue for the request body.\n\n- Agent status: `%s`\n- Pack: `_collective/%s`\n\nValidation ran during generation; the `collective-request.json` sidecar in the diff has the report. A reviewer should sanity-check the content before merging.' \
            "$ISSUE" "$REQUESTER" "$([ "${AGENT_STATUS:-1}" -eq 0 ] && echo passed || echo failed-validation)" "$SLUG")

          set +e
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Collective request: ${SLUG} (issue #${ISSUE})" \
            --body "$BODY" \
            --label "$LABELS")
          PR_STATUS=$?
          set -e

          if [ "$PR_STATUS" -ne 0 ]; then
            echo "::error::pr creation failed — deleting orphan remote branch"
            git push origin --delete "$BRANCH" 2>/dev/null || true
            gh issue comment "$ISSUE" --body "The agent produced an edit but PR creation failed. Check the workflow logs and re-run with \`/retry\`."
            exit 1
          fi

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          gh issue comment "$ISSUE" --body "Collective-request PR opened: $PR_URL"

      - name: Clear processing label
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
          AGENT_STATUS: ${{ steps.apply.outputs.agent_status }}
        run: |
          gh issue edit "$ISSUE" --remove-label processing || true
          if [ "${AGENT_STATUS:-1}" -ne 0 ]; then
            gh issue edit "$ISSUE" --add-label failed-change || true
          fi
