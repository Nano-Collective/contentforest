name: Weekly Content Pack

on:
  schedule:
    # 00:15 UTC Monday — curate the week's unused content for review.
    - cron: "15 0 * * 1"
  workflow_dispatch:
    inputs:
      date:
        description: "Pack date YYYY-MM-DD (omit for today, UTC)"
        required: false
        type: string
      dry_run:
        description: "Write to content/_test/ instead of opening a PR"
        required: false
        type: boolean
        default: false

concurrency:
  group: weekly-pack
  cancel-in-progress: false

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        # pin: actions/checkout@v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up PNPM
        # pin: pnpm/action-setup@v4.4.0
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10.11.0

      - name: Use Node.js 22
        # pin: actions/setup-node@v4.4.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build and install Nanocoder from main
        run: |
          git clone --depth 1 https://github.com/Nano-Collective/nanocoder.git /tmp/nanocoder
          cd /tmp/nanocoder
          npm install
          npm run build
          npm link
          which nanocoder
          nanocoder --version || true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Ensure PR labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create weekly-pack --color "8957e5" --description "Automated weekly content pack PR" --force

      - name: Resolve date
        id: resolve
        env:
          INPUT_DATE: ${{ inputs.date }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_DATE:-}" ]; then
            DATE="$INPUT_DATE"
          else
            DATE=$(date -u +%F)
          fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "Resolved date: $DATE"

      - name: Curate and open a PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run }}
          DATE: ${{ steps.resolve.outputs.date }}
          # Skip the model-context probe to models.dev for unknown providers.
          NANOCODER_CONTEXT_LIMIT: "128000"
        run: |
          set -euo pipefail
          BRANCH="auto/weekly-pack-${DATE}"
          PACK_DIR="content/_weekly/${DATE}"
          DIGEST="${PACK_DIR}/digest.md"

          # Skip if a branch already exists for this date — prevents duplicate
          # PRs on retried runs.
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "branch $BRANCH already exists on origin, skipping"
            exit 0
          fi

          git checkout -B "$BRANCH" origin/main

          if [ "${DRY_RUN:-false}" = "true" ]; then
            pnpm weekly-pack --date "$DATE" --test
            echo "dry_run: skipping PR open"
            exit 0
          fi

          # Run curation. A missing digest means there was genuinely nothing
          # unused to recommend (not an error) — exit cleanly without a PR.
          # A non-zero exit IS a system failure (e.g. the selector never
          # produced a valid pick set) — surface it as red workflow status.
          pnpm weekly-pack --date "$DATE" --commit

          if [ ! -f "$DIGEST" ]; then
            echo "no digest for ${DATE} — nothing unused to recommend, skipping PR"
            git checkout main
            git branch -D "$BRANCH" 2>/dev/null || true
            exit 0
          fi

          git add content/_weekly/
          if [ -z "$(git diff --cached --name-only)" ]; then
            echo "no content changes after add; skipping PR"
            git checkout main
            git branch -D "$BRANCH" 2>/dev/null || true
            exit 0
          fi
          git commit -m "auto: weekly content pack ${DATE}"
          git push --set-upstream origin "$BRANCH"

          META_PATH="${PACK_DIR}/meta.json"
          PICK_COUNT=$(jq -r '.picks | length' "$META_PATH" 2>/dev/null || echo "0")

          BODY=$(printf 'Automated weekly content pack for **%s**.\n\nOne recommended unused piece per channel, curated from across the product and collective packs (Daily X posts excluded). Picks: `%s`.\n\nThe digest links back to each source file - mark a piece distributed or won'"'"'t-use on its own pack page, not here.' \
            "$DATE" "$PICK_COUNT")

          # Try to open the PR. If creation fails, the branch on origin is
          # orphaned — delete it so the next run isn't blocked by the guard.
          set +e
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Weekly content pack: ${DATE}" \
            --body "$BODY" \
            --label "weekly-pack"
          PR_STATUS=$?
          set -e

          if [ "$PR_STATUS" -ne 0 ]; then
            echo "::error::pr creation failed for ${DATE} — deleting remote branch to unblock retries"
            git push origin --delete "$BRANCH" 2>/dev/null || true
            git checkout main
            git branch -D "$BRANCH" 2>/dev/null || true
            exit 1
          fi

          git checkout main
          git branch -D "$BRANCH" 2>/dev/null || true
