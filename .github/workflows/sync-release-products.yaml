name: Sync Release Products

# Keeps the product dropdown in the "Request New Release Content" issue
# template aligned with `config/products.json`. Runs whenever a push to main
# changes the products config (or the sync script / workflow itself),
# regenerates the marker-bracketed product block in the template, and opens a
# PR with the result if it changed.
#
# Pushes from the default GITHUB_TOKEN do not recursively trigger workflows,
# so this can't loop on its own commit. Sister to sync-change-targets.yaml.

on:
  push:
    branches: [main]
    paths:
      - 'config/products.json'
      - 'scripts/sync-release-products.ts'
      - '.github/workflows/sync-release-products.yaml'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-release-products
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # pin: actions/checkout@v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up PNPM
        # pin: pnpm/action-setup@v4.4.0
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10.11.0

      - name: Use Node.js 22
        # pin: actions/setup-node@v4.4.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Regenerate product dropdown
        run: pnpm sync-release-products

      - name: Commit on chore branch and open PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          FILE=.github/ISSUE_TEMPLATE/release-request.yml
          BRANCH=chore/sync-release-products
          if git diff --quiet -- "$FILE"; then
            echo "no changes — product dropdown already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add "$FILE"
          git commit -m "chore: sync release-request product dropdown"
          git push --force --set-upstream origin "$BRANCH"
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: sync release-request product dropdown" \
              --body "Auto-generated by sync-release-products. Regenerates the product dropdown in release-request.yml from config/products.json."
          else
            echo "PR #$EXISTING already open for $BRANCH — force-pushed update"
          fi
