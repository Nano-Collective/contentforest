name: Daily X Posts

on:
  schedule:
    # 00:15 UTC daily — just after midnight.
    - cron: "15 0 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Bucket date YYYY-MM-DD (omit for today, UTC)"
        required: false
        type: string
      dry_run:
        description: "Write to content/_test/ instead of committing to main"
        required: false
        type: boolean
        default: false

concurrency:
  group: x-daily
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 10.11.0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build and install Nanocoder from main
        run: |
          git clone --depth 1 https://github.com/Nano-Collective/nanocoder.git /tmp/nanocoder
          cd /tmp/nanocoder
          npm install
          npm run build
          npm link
          which nanocoder
          nanocoder --version || true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch reference docs
        run: pnpm fetch-refs

      - name: Resolve date
        id: resolve
        env:
          INPUT_DATE: ${{ inputs.date }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_DATE:-}" ]; then
            DATE="$INPUT_DATE"
          else
            DATE=$(date -u +%F)
          fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "Resolved date: $DATE"

      - name: Generate, validate, and commit to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run }}
          DATE: ${{ steps.resolve.outputs.date }}
          # Skip the model-context probe to models.dev for unknown providers.
          NANOCODER_CONTEXT_LIMIT: "128000"
        run: |
          set -euo pipefail
          PACK_DIR="content/_x-daily/${DATE}"
          POSTS_DIR="${PACK_DIR}/posts"

          git fetch origin main

          # Idempotency: skip if this date's bucket already landed on main —
          # prevents a retried run from regenerating posts.
          if git ls-tree -d "origin/main" "$PACK_DIR" | grep -q "$PACK_DIR"; then
            echo "$PACK_DIR already exists on main, skipping"
            exit 0
          fi

          git checkout -B main origin/main

          if [ "${DRY_RUN:-false}" = "true" ]; then
            pnpm x-daily --date "$DATE" --test
            echo "dry_run: skipping commit"
            exit 0
          fi

          # Run generation. Validation failures (posts present but rules broken)
          # are NOT system failures — the posts still land on main and the
          # distribution step in the web UI is the human gate. Generation
          # crashes (Nanocoder error, network, etc.) ARE system failures —
          # clean up and surface them as red workflow status.
          set +e
          pnpm x-daily --date "$DATE" --commit
          GEN_STATUS=$?
          set -e

          # Discriminator: did the writers actually produce any post files?
          POST_COUNT=$(find "$POSTS_DIR" -maxdepth 1 -name "*.md" 2>/dev/null | wc -l | tr -d ' ')
          if [ "${POST_COUNT:-0}" -lt 1 ]; then
            echo "::error::x-daily produced no post files for ${DATE} — system failure"
            rm -rf "$PACK_DIR"
            exit 1
          fi

          # Stage the bucket plus the ledger (the script appends to it on a
          # clean pass) and commit.
          git add content/_x-daily/
          if [ -z "$(git diff --cached --name-only)" ]; then
            echo "no content changes after add; skipping commit"
            exit 0
          fi

          META_PATH="${PACK_DIR}/meta.json"
          FINAL_STATUS=$(jq -r '.final_status // "unknown"' "$META_PATH" 2>/dev/null || echo "unknown")
          if [ "$FINAL_STATUS" != "passed" ] || [ "$GEN_STATUS" -ne 0 ]; then
            echo "::warning::x-daily for ${DATE} did not pass validation (final_status=${FINAL_STATUS}); committing anyway — sanity-check before distributing"
          fi

          git commit -m "auto: x-daily posts ${DATE}"

          # Push straight to main. A distribute commit (or another job) may have
          # landed while we generated, so rebase and retry the push race.
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              echo "pushed x-daily posts for ${DATE} to main"
              exit 0
            fi
            echo "push attempt ${attempt} failed (main moved?), retrying"
            sleep 3
          done

          echo "::error::failed to push x-daily posts for ${DATE} to main after retries"
          exit 1
