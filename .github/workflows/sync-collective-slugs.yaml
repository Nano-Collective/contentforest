name: Sync Collective Slugs

# Keeps the slug dropdown in the "Request Collective Content Change" issue
# template aligned with the actual set of collective packs on `main`. Runs
# whenever a push to main changes anything under `content/_collective/`,
# regenerates the marker-bracketed slug block in the template, and commits
# the result back if it changed.
#
# Pushes from the default GITHUB_TOKEN do not recursively trigger workflows,
# so this can't loop on its own commit.

on:
  push:
    branches: [main]
    paths:
      - 'content/_collective/**'
      - 'scripts/sync-collective-slugs.ts'
      - '.github/workflows/sync-collective-slugs.yaml'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-collective-slugs
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # pin: actions/checkout@v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up PNPM
        # pin: pnpm/action-setup@v4.4.0
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10.11.0

      - name: Use Node.js 22
        # pin: actions/setup-node@v4.4.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Regenerate slug dropdown
        run: pnpm sync-collective-slugs

      - name: Commit on chore branch and open PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          FILE=.github/ISSUE_TEMPLATE/collective-request.yml
          BRANCH=chore/sync-collective-slugs
          if git diff --quiet -- "$FILE"; then
            echo "no changes — slug dropdown already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Always rebase the chore branch on top of latest main. Force-push
          # is safe here because the branch is mechanically generated; the
          # only thing it ever contains is one regenerated file. If a prior
          # PR is still open, the force-push updates it in place.
          git checkout -B "$BRANCH"
          git add "$FILE"
          git commit -m "chore: sync collective slugs dropdown"
          # --force (not --force-with-lease) because the runner's clone only
          # has main; it doesn't know what's on origin/$BRANCH. The chore
          # branch is mechanically owned by this workflow (concurrency block
          # serialises runs) so the lease check is meaningless here.
          git push --force --set-upstream origin "$BRANCH"
          # Open a PR if one isn't already open for this branch.
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: sync collective slugs dropdown" \
              --body "Auto-generated by sync-collective-slugs. Regenerates the slug dropdown in collective-request.yml from the directories under content/_collective/."
          else
            echo "PR #$EXISTING already open for $BRANCH — force-pushed update"
          fi
