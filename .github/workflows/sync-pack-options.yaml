name: Sync Pack Options

# Keeps the base-pack dropdown in the "Request Personal Pack" issue template
# aligned with what's on disk under `content/`. Runs whenever a push to main
# changes anything under `content/` (or the sync script / workflow itself),
# regenerates the marker-bracketed pack block in the template, and commits
# the result back if it changed.
#
# Pushes from the default GITHUB_TOKEN do not recursively trigger workflows,
# so this can't loop on its own commit. Sister to sync-collective-slugs.yaml
# and sync-team-members.yaml.

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'scripts/sync-pack-options.ts'
      - '.github/workflows/sync-pack-options.yaml'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-pack-options
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 10.11.0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Regenerate base-pack dropdown
        run: pnpm sync-pack-options

      - name: Commit on chore branch and open PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          FILE=.github/ISSUE_TEMPLATE/personal-request.yml
          BRANCH=chore/sync-pack-options
          if git diff --quiet -- "$FILE"; then
            echo "no changes — base-pack dropdown already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add "$FILE"
          git commit -m "chore: sync base-pack dropdown"
          git push --force-with-lease --set-upstream origin "$BRANCH"
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: sync base-pack dropdown" \
              --body "Auto-generated by sync-pack-options. Regenerates the base-pack dropdown in personal-request.yml from the directories under content/."
          else
            echo "PR #$EXISTING already open for $BRANCH — force-pushed update"
          fi
