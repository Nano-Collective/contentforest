name: Sync Pack Options

# Keeps the base-pack dropdown in the "Request Personal Pack" issue template
# aligned with what's on disk under `content/`. Runs whenever a push to main
# changes anything under `content/` (or the sync script / workflow itself),
# regenerates the marker-bracketed pack block in the template, and commits
# the result back if it changed.
#
# Pushes from the default GITHUB_TOKEN do not recursively trigger workflows,
# so this can't loop on its own commit. Sister to sync-collective-slugs.yaml
# and sync-team-members.yaml.

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'scripts/sync-pack-options.ts'
      - '.github/workflows/sync-pack-options.yaml'

permissions:
  contents: write

concurrency:
  group: sync-pack-options
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 10.11.0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Regenerate base-pack dropdown
        run: pnpm sync-pack-options

      - name: Commit if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet -- .github/ISSUE_TEMPLATE/personal-request.yml; then
            echo "no changes — base-pack dropdown already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/ISSUE_TEMPLATE/personal-request.yml
          git commit -m "chore: sync base-pack dropdown [skip ci]"
          git push
